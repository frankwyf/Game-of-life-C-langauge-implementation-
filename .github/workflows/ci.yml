name: ci

on:
  push:
  pull_request:

jobs:
  linux-build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake git pkg-config \
            libx11-dev libwayland-dev libgl1-mesa-dev libpulse-dev libasound2-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev \
            libudev-dev libibus-1.0-dev fcitx-libs-dev
          echo "Building SDL3 from source..."
          rm -rf /tmp/SDL
          git clone --depth 1 https://github.com/libsdl-org/SDL.git /tmp/SDL
          cd /tmp/SDL
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_TESTS=OFF
          cmake --build . -j"$(nproc)" --config Release
          sudo cmake --install .
          sudo ldconfig
          echo "SDL3 ready"

      - name: Build game
        run: |
          make -C src clean
          make -C src NO_SDL3=1

      - name: Smoke test game startup
        run: |
          cd src
          ./game --smoke-test

      - name: Build tests
        run: |
          make -C test clean
          make -C test NO_SDL3=1

      - name: Run datastructure tests
        run: |
          cd test
          ./datastructure.out

      - name: Run check tests
        run: |
          cd test
          ./check.out

      - name: Run gameui tests
        run: |
          cd test
          ./gameui.out

  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true

      - name: Build game and tests
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-make
          pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-SDL3 || pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-sdl3
          export PATH="/ucrt64/bin:$PATH"
          export SDL_VIDEODRIVER=dummy
          mingw32-make -C src clean
          mingw32-make -C src
          ./src/game.exe --smoke-test
          mingw32-make -C test clean
          mingw32-make -C test

      - name: Run tests in MSYS2
        shell: msys2 {0}
        run: |
          cd test
          ./datastructure.exe
          ./check.exe
          ./gameui.exe
