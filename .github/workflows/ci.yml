name: ci

on:
  push:
  pull_request:

jobs:
  linux-build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          retry() {
            local n=1
            local max=3
            local delay=5
            while true; do
              "$@" && break
              if [ "$n" -ge "$max" ]; then
                return 1
              fi
              n=$((n+1))
              sleep "$delay"
            done
          }

          retry sudo apt-get update
          retry sudo apt-get install -y build-essential cmake pkg-config git ca-certificates

          if ! retry sudo apt-get install -y libsdl3-dev; then
            echo "libsdl3-dev unavailable, building SDL3 from source..."
            rm -rf /tmp/SDL
            retry git clone --depth 1 https://github.com/libsdl-org/SDL.git /tmp/SDL
            cmake -S /tmp/SDL -B /tmp/SDL/build -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF
            cmake --build /tmp/SDL/build -j"$(nproc)"
            sudo cmake --install /tmp/SDL/build
            sudo ldconfig
          fi

      - name: Build game
        run: |
          make -C src clean
          make -C src

      - name: Smoke test game startup
        run: |
          export SDL_VIDEODRIVER=dummy
          cd src
          ./game --smoke-test

      - name: Build tests
        run: |
          make -C test clean
          make -C test

      - name: Run datastructure tests
        run: |
          cd test
          ./datastructure.out

      - name: Run check tests
        run: |
          cd test
          ./check.out

      - name: Run gameui tests
        run: |
          cd test
          ./gameui.out

  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true

      - name: Build game and tests
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-make
          pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-SDL3 || pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-sdl3
          export PATH="/ucrt64/bin:$PATH"
          export SDL_VIDEODRIVER=dummy
          mingw32-make -C src clean
          mingw32-make -C src
          ./src/game.exe --smoke-test
          mingw32-make -C test clean
          mingw32-make -C test

      - name: Run tests in MSYS2
        shell: msys2 {0}
        run: |
          cd test
          ./datastructure.exe
          ./check.exe
          ./gameui.exe
